<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>指數跌幅分析工具</title>
<link rel="manifest" href="/manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Drop Radar">
<meta name="theme-color" content="#0ea5e9">
<link rel="apple-touch-icon" href="/icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0e1a; --surface:#111827; --surface2:#1a2236;
    --border:#1e3a5f; --accent:#0ea5e9; --accent2:#f43f5e;
    --accent3:#10b981; --text:#e2e8f0; --text2:#94a3b8;
    --text3:#64748b; --red:#f43f5e; --green:#10b981;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;
    background-image:radial-gradient(ellipse at 20% 20%,rgba(14,165,233,.05) 0%,transparent 50%),
                     radial-gradient(ellipse at 80% 80%,rgba(244,63,94,.04) 0%,transparent 50%)}
  header{border-bottom:1px solid var(--border);padding:18px 40px;display:flex;align-items:center;gap:14px;
    background:rgba(17,24,39,.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
  .logo{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
    font-family:'JetBrains Mono',monospace;color:#fff;flex-shrink:0}
  header h1{font-size:17px;font-weight:500;letter-spacing:.04em}
  header .sub{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}
  header .right{margin-left:auto;display:flex;align-items:center;gap:12px}
  .lang-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);
    color:var(--text2);font-size:11px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;
    transition:all .2s;white-space:nowrap}
  .lang-btn:hover{border-color:var(--accent);color:var(--accent)}
  main{max-width:1100px;margin:0 auto;padding:36px 24px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:28px}
  .card-label{font-size:11px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px}
  .controls{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap}
  .field{display:flex;flex-direction:column;gap:7px}
  .field label{font-size:12px;color:var(--text2)}
  .period-group{display:flex;gap:8px}
  .pbtn{padding:9px 22px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);
    color:var(--text2);font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s}
  .pbtn:hover{border-color:var(--accent);color:var(--accent)}
  .pbtn.active{background:rgba(14,165,233,.15);border-color:var(--accent);color:var(--accent);font-weight:500}
  select{padding:9px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);
    color:var(--text);font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;outline:none}
  .run-btn{padding:9px 30px;border-radius:8px;border:none;
    background:linear-gradient(135deg,var(--accent),#0284c7);color:#fff;
    font-size:14px;font-weight:500;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .2s}
  .run-btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 18px rgba(14,165,233,.3)}
  .run-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
  #prog-area{display:none}
  .prog-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);
    border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .prog-wrap{background:var(--surface2);border-radius:4px;height:3px;margin-bottom:10px;overflow:hidden}
  .prog-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
    width:0;transition:width .5s;border-radius:4px;animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
  #prog-msg{font-size:12px;color:var(--text2);font-family:'JetBrains Mono',monospace}
  #result-area{display:none}
  .meta-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
  .chip{background:var(--surface2);border:1px solid var(--border);border-radius:7px;
    padding:6px 14px;font-size:12px;color:var(--text2)}
  .chip span{color:var(--text);font-weight:500}
  .dl-btn{margin-left:auto;padding:7px 18px;border-radius:7px;border:1px solid var(--accent3);
    background:rgba(16,185,129,.1);color:var(--accent3);font-size:12px;
    font-family:'Noto Sans TC',sans-serif;cursor:pointer;text-decoration:none;
    display:inline-flex;align-items:center;gap:5px;transition:all .2s}
  .dl-btn:hover{background:rgba(16,185,129,.2)}
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:11px 15px;color:var(--text3);font-size:11px;font-weight:500;
    letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--surface2)}
  td{padding:13px 15px;border-bottom:1px solid rgba(30,58,95,.4);vertical-align:middle}
  tr:hover td{background:rgba(14,165,233,.03)}
  tr:last-child td{border-bottom:none}
  .rank{color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:12px}
  .rank.t3{color:var(--accent2);font-weight:700}
  .code{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2)}
  .pct{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:14px;color:var(--red)}
  .pct.pos{color:var(--green)}
  #err-card{background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.3);
    border-radius:12px;padding:20px;color:var(--red);display:none}
  footer{text-align:center;padding:32px 24px 20px;color:var(--text3);font-size:11px;line-height:2}

  /* ── RWD ────────────────────────────────────── */
  @media (max-width:768px){
    header{padding:14px 16px;gap:10px}
    header h1{font-size:15px}
    header .sub{font-size:10px}
    main{padding:20px 12px}
    .card{padding:20px 16px;margin-bottom:18px}
  }
  @media (max-width:540px){
    header .sub{display:none}
    .controls{flex-direction:column;align-items:stretch}
    .field{width:100%}
    .period-group{display:flex}
    .pbtn{flex:1;text-align:center;padding:10px 8px}
    select{width:100%}
    .run-btn{width:100%;padding:12px}
    .prog-head{flex-wrap:wrap;gap:8px}
    .prog-head>div:last-child{width:100%;margin-left:0;text-align:left}
    .meta-row{gap:8px}
    .chip{font-size:11px;padding:5px 10px}
    .dl-btn{margin-left:0;width:100%;justify-content:center;padding:9px 14px}
    .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px}
    table{min-width:500px;font-size:12px}
    th{padding:9px 10px;font-size:10px}
    td{padding:10px}
    footer{padding:24px 16px 16px;font-size:10px}
  }
</style>
</head>
<body>
<header>
  <div class="logo">DR</div>
  <h1 data-i18n="title">指數跌幅分析工具</h1>
  <div class="sub" data-i18n="header.sub">資料來源：東方財富 / Yahoo Finance</div>
  <div class="right">
    <button class="lang-btn" id="lang-btn" onclick="toggleLang()">English</button>
  </div>
</header>
<main>
  <div class="card">
    <div class="card-label" data-i18n="label.index">指數</div>
    <div class="controls">
      <div class="field">
        <label data-i18n="label.index">指數</label>
        <select id="indexSelect" onchange="onIndexChange()">
          <!-- 由 /api/indices 動態產生 -->
        </select>
      </div>
      <div class="field">
        <label data-i18n="label.mode">排行方向</label>
        <div class="period-group">
          <button class="pbtn active" id="btn-drop" onclick="setMode('drop')"
            data-i18n="label.mode.drop">跌幅排行</button>
          <button class="pbtn" id="btn-rise" onclick="setMode('rise')"
            data-i18n="label.mode.rise">漲幅排行</button>
        </div>
      </div>
      <div class="field">
        <label data-i18n="label.period">時間區間</label>
        <div class="period-group">
          <button class="pbtn" id="btn-week" onclick="setPeriod('week')"
            data-i18n="label.period.week">近一週</button>
          <button class="pbtn active" id="btn-month" onclick="setPeriod('month')"
            data-i18n="label.period.month">近一個月</button>
        </div>
      </div>
      <div class="field">
        <label data-i18n="label.topn">顯示筆數</label>
        <select id="topn" onchange="rerender()">
          <option value="5"  data-i18n="label.topn.5">前 5 名</option>
          <option value="10" selected data-i18n="label.topn.10">前 10 名</option>
          <option value="20" data-i18n="label.topn.20">前 20 名</option>
          <option value="50" data-i18n="label.topn.50">前 50 名</option>
        </select>
      </div>
      <button class="run-btn" id="run-btn" onclick="startQuery()"
        data-i18n="btn.run">▶ 開始查詢</button>
    </div>
  </div>

  <div class="card" id="prog-area">
    <div class="prog-head">
      <div class="spinner"></div>
      <div id="prog-title" style="font-size:13px;font-weight:500"
        data-i18n="progress.title">資料擷取中...</div>
      <div id="prog-hint" style="margin-left:auto;font-size:11px;color:var(--text3)"></div>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
    <div id="prog-msg" data-i18n="progress.init">初始化中...</div>
  </div>

  <div id="err-card">⚠️ <span id="err-msg"></span></div>

  <div id="result-area">
    <div class="meta-row" id="meta-row"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr id="thead-row">
            <th data-i18n="col.rank">排名</th>
            <th data-i18n="col.code">代碼</th>
            <th data-i18n="col.name">名稱</th>
            <th data-i18n="col.start_close">期初收盤</th>
            <th data-i18n="col.end_close">最新收盤</th>
            <th data-i18n="col.pct_change">漲跌幅</th>
            <th data-i18n="col.period">期間</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</main>
<footer><span data-i18n="footer.text">資料來源：東方財富 / Yahoo Finance ｜ 本工具僅供參考，不構成任何投資建議</span></footer>

<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');

// ── i18n ───────────────────────────────────────────────────────────────
let _tr = {};
let _lang = localStorage.getItem('lang') ||
  (navigator.language.startsWith('zh') ? 'zh-TW' : 'en');

async function loadI18n() {
  const file = _lang === 'zh-TW' ? '/i18n/zh-TW.json' : '/i18n/en.json';
  try {
    const res = await fetch(file);
    _tr = await res.json();
  } catch(e) { _tr = {}; }
  applyI18n();
}

function t(key) { return _tr[key] || key; }

function applyI18n() {
  document.documentElement.lang = _lang;
  document.title = t('title');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    el.textContent = t(k);
  });
  // lang toggle button 顯示「切換到哪個語言」
  document.getElementById('lang-btn').textContent = t('lang.toggle');
  // topn 選項
  document.querySelectorAll('#topn option[data-i18n]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  // 指數下拉重建（語言切換後顯示名稱改變）
  rebuildIndexSelect();
  // 若有舊結果也重新渲染
  if (lastResult) render(lastResult);
}

function toggleLang() {
  _lang = _lang === 'zh-TW' ? 'en' : 'zh-TW';
  localStorage.setItem('lang', _lang);
  loadI18n();
}

// ── 指數清單 ───────────────────────────────────────────────────────────
let indices = [];   // from /api/indices
let currentIndex = null;

async function loadIndices() {
  try {
    const res = await fetch('/api/indices');
    indices = await res.json();
  } catch(e) { indices = []; }
  rebuildIndexSelect();
}

function rebuildIndexSelect() {
  const sel = document.getElementById('indexSelect');
  const prev = sel.value;
  sel.innerHTML = '';
  indices.forEach(idx => {
    const opt = document.createElement('option');
    opt.value = idx.id;
    opt.textContent = _lang === 'zh-TW' ? idx.display_name_zh : idx.display_name_en;
    sel.appendChild(opt);
  });
  if (prev && indices.find(i => i.id === prev)) sel.value = prev;
  onIndexChange();
}

function onIndexChange() {
  const id = document.getElementById('indexSelect').value;
  currentIndex = indices.find(i => i.id === id) || null;
  // 更新估計時間提示
  if (currentIndex) {
    const hint = _lang === 'zh-TW'
      ? currentIndex.estimated_time_zh
      : currentIndex.estimated_time_en;
    document.getElementById('prog-hint').textContent =
      currentIndex.expected_constituent_count + ' ' +
      (_lang === 'zh-TW' ? '檔，' : 'stocks, ') + hint;
  }
}

// ── 查詢流程 ───────────────────────────────────────────────────────────
let period = 'month', mode = 'drop', taskId = null, pollT = null, lastResult = null;

function setPeriod(p) {
  period = p;
  document.getElementById('btn-week').classList.toggle('active', p === 'week');
  document.getElementById('btn-month').classList.toggle('active', p === 'month');
}

function setMode(m) {
  mode = m;
  document.getElementById('btn-drop').classList.toggle('active', m === 'drop');
  document.getElementById('btn-rise').classList.toggle('active', m === 'rise');
}

async function startQuery() {
  const topN    = parseInt(document.getElementById('topn').value);
  const indexId = document.getElementById('indexSelect').value;
  if (!indexId) return;

  document.getElementById('run-btn').disabled = true;
  document.getElementById('prog-area').style.display = 'block';
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('err-card').style.display = 'none';
  document.getElementById('prog-bar').style.width = '0%';
  document.getElementById('prog-msg').textContent = t('progress.init');

  const res = await fetch('/api/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ index: indexId, period, mode, top_n: topN })
  });
  const { task_id } = await res.json();
  taskId = task_id;
  pollT  = setInterval(poll, 2500);
}

async function poll() {
  if (!taskId) return;
  const resp = await fetch('/api/status/' + taskId);
  if (!resp.ok) {
    clearInterval(pollT);
    document.getElementById('prog-area').style.display = 'none';
    document.getElementById('run-btn').disabled = false;
    document.getElementById('err-card').style.display = 'block';
    document.getElementById('err-msg').textContent = t('err.server');
    return;
  }
  const d = await resp.json();
  document.getElementById('prog-msg').textContent = d.progress || t('progress.init');
  if (d.pct) document.getElementById('prog-bar').style.width = d.pct + '%';

  if (d.status === 'done') {
    clearInterval(pollT);
    document.getElementById('prog-bar').style.width = '100%';
    setTimeout(() => {
      document.getElementById('prog-area').style.display = 'none';
      document.getElementById('run-btn').disabled = false;
      render(d.result);
    }, 500);
  } else if (d.status === 'error') {
    clearInterval(pollT);
    document.getElementById('prog-area').style.display = 'none';
    document.getElementById('run-btn').disabled = false;
    document.getElementById('err-card').style.display = 'block';
    document.getElementById('err-msg').textContent = d.error;
  }
}

// ── 渲染結果 ───────────────────────────────────────────────────────────
function fmt(s) { return s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6); }

function rerender() { if (lastResult) render(lastResult); }

function render(r) {
  lastResult = r;
  const topN   = parseInt(document.getElementById('topn').value);
  const rows   = (r.all_data || r.top_losers).slice(0, topN);
  const ccySym = r.currency === 'CNY' ? '¥' : '$';

  // 更新表頭（i18n）
  document.querySelectorAll('#thead-row th[data-i18n]').forEach(th => {
    th.textContent = t(th.getAttribute('data-i18n'));
  });

  // 模式標籤
  const modeLabel = t('label.mode.' + (r.mode || 'drop'));

  // 區間標籤
  const periodLabel = t('period.' + r.period);

  // meta row
  document.getElementById('meta-row').innerHTML = `
    <div class="chip">${t('meta.period')}：<span>${periodLabel}</span></div>
    <div class="chip">${t('label.mode')}：<span>${modeLabel}</span></div>
    <div class="chip">${t('meta.start')}：<span>${fmt(r.start_date)}</span></div>
    <div class="chip">${t('meta.end')}：<span>${fmt(r.end_date)}</span></div>
    <div class="chip">${t('meta.fetched')}：<span>${r.fetched}/${r.total}</span></div>
    <div class="chip">${t('meta.generated')}：<span>${r.generated_at}</span></div>
    <a class="dl-btn" href="/api/download/${taskId}?top_n=${topN}&lang=${_lang}">${t('meta.download')}</a>`;

  // 資料列
  document.getElementById('tbody').innerHTML = rows.map((row, i) => {
    const rk  = i + 1;
    const pos = row.pct_change >= 0;
    return `<tr>
      <td><span class="rank ${rk<=3?'t3':''}">#${rk}</span></td>
      <td><span class="code">${row.code}</span></td>
      <td>${row.name}</td>
      <td style="font-family:'JetBrains Mono',monospace">${ccySym}${row.start_close.toFixed(2)}</td>
      <td style="font-family:'JetBrains Mono',monospace">${ccySym}${row.end_close.toFixed(2)}</td>
      <td><span class="pct ${pos?'pos':''}">${pos?'+':''}${row.pct_change.toFixed(2)}%</span></td>
      <td style="color:var(--text3);font-size:11px;font-family:'JetBrains Mono',monospace">${row.start_date} → ${row.end_date}</td>
    </tr>`;
  }).join('');

  document.getElementById('result-area').style.display = 'block';
}

// ── 初始化 ─────────────────────────────────────────────────────────────
(async () => {
  await loadI18n();
  await loadIndices();
})();
</script>
</body>
</html>
